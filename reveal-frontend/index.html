<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

		<title>reveal.js</title>

		<link rel="stylesheet" href="dist/reset.css">
		<link rel="stylesheet" href="dist/reveal.css">
		<link rel="stylesheet" href="dist/theme/night.css">

		<!-- Theme used for syntax highlighted code -->
		<link rel="stylesheet" href="plugin/highlight/monokai.css">
		<style>
			@font-face {
				font-family: "Frauen-Script";
				src: url("/assets/fonts/FrauenScript.otf");
			}

			.blink {
				animation: blink 1s step-end infinite;
			}

			@keyframes blink {
			67% {
				opacity: 0
			}
			}

			.header {
				font-family: "Frauen-Script";
				font-size: 2.5em;
				text-align: center;
				position: absolute;
  				left: 50%;
				top: 15%;
				width: 30%;
			}


			.reveal-viewport {
				background-color: black;
			}

			.eliza {
				position: absolute;
				top: 10%;
				width: 35%;
				font-family: "Arial", sans-serif;
				font-weight: 500;
				font-size: .7em;
				/* letter-spacing: 0.02em; */
				text-align: left;
				left: 10vw;
			}

			.question {
				position: absolute;
				top: 30%;
				width: 30%;
				font-family: "Frauen-Script";
				text-align: left;
				left: 10vw;
			}

			.reveal section video {
				height: 100vh;
				z-index: 100;
				width: auto;
				position: absolute;
				bottom: 0;
			}
			.reveal section img {
				height: 100vh;
				z-index: 100;
				width: auto;
				position: absolute;
				bottom: 0;
				margin: 0px;
			}
			.videowrapper {
				position: relative;
				min-height: 100vh;
				height: 100vh;
			}
			.url {
				position: absolute;
  				left: 50%;
  				font-size: .4em;
  				z-index: 200;
  				top: 18%;
  				font-family: Courier;
  				text-align: center;
  				width: 30%;
			}
			.wifi {
				position: absolute;
  				left: 50%;
  				font-size: .4em;
  				z-index: 200;
  				top: 12%;
  				font-family: Courier;
  				text-align: center;
  				width: 30%;
			}

			.password {
				position: absolute;
  				left: 50%;
  				font-size: .4em;
  				z-index: 200;
  				top: 15%;
  				font-family: Courier;
  				text-align: center;
  				width: 30%;
			}

			.overlay {
				z-index: 300 !important;
			}
		</style>
	</head>
	<body>
		<div class="reveal">
			<div class="slides">
				<!-- Placeholder for Reveal.js initialization -->
				<section id="loading">
					<div class="videowrapper">
						<p class="header">Artist's Model</p>
					</div>
				</section>
			</div>
		</div>

		<script src="dist/reveal.js"></script>
		<script src="plugin/notes/notes.js"></script>
		<script src="plugin/markdown/markdown.js"></script>
		<script src="plugin/highlight/highlight.js"></script>
		<script>
			(function () {
				// ── Config ──────────────────────────────────────────
				const API_BASE = 'https://quiz.isthisa.computer';
				// const API_BASE = 'http://localhost:8040';
				const POLL_INTERVAL = 1000;

				// ── State (in-memory, not localStorage) ─────────────
				let currentPollTag = null;
				let hasJumped = false;
				const loadedSections = new Set();

				// ── Initialize Reveal ───────────────────────────────
				Reveal.initialize({
					hash: false,
					progress: false,
					controls: false,
					autoPlayMedia: true,
					transition: 'none',
					disableLayout: true,
					plugins: [RevealMarkdown, RevealHighlight, RevealNotes]
				});

				// ── Slide building ──────────────────────────────────

				function buildSlideElement(slide, sectionTag, index) {
					const section = document.createElement('section');
					section.id = sectionTag + '-' + index;

					const wrapper = document.createElement('div');
					wrapper.className = 'videowrapper';

					// Media
					if (slide.video) {
						const video = document.createElement('video');
						video.src = slide.video;
						video.autoplay = true;
						video.muted = true;
						video.playsInline = true;
						wrapper.appendChild(video);
					}

					if (slide.image) {
						const img = document.createElement('img');
						img.src = slide.image;
						if (slide.overlay) {
							img.classList.add('overlay');
						}
						wrapper.appendChild(img);
					}

					// Text content varies by slide type
					switch (slide.type) {
						case 'header':
							if (slide['slide-text']) {
								const p = document.createElement('p');
								p.className = 'header';
								p.textContent = slide['slide-text'];
								wrapper.appendChild(p);
							}
							break;

						case 'eliza':
							if (slide['slide-text']) {
								const p = document.createElement('p');
								p.className = 'eliza';
								p.innerHTML = slide['slide-text'].replace(/\n/g, '<br>');
								wrapper.appendChild(p);
							}
							break;

						case 'question':
							if (slide['slide-text']) {
								var lines = slide['slide-text'].split('\n');
								lines.forEach(function (line) {
									var p = document.createElement('p');
									if (line.startsWith('http')) {
										p.className = 'url';
									} else if (line.startsWith('wifi:')) {
										p.className = 'wifi';
									} else if (line.startsWith('password:')) {
										p.className = 'password';
									}
									p.textContent = line;
									wrapper.appendChild(p);
								});
							}
							break;
					}

					section.appendChild(wrapper);
					return section;
				}

				function addSectionSlides(sectionData, sectionTag) {
					if (loadedSections.has(sectionTag)) {
						console.log('[slides] Section already loaded:', sectionTag);
						return;
					}

					var slidesContainer = document.querySelector('.reveal .slides');
					sectionData.forEach(function (slide, index) {
						slidesContainer.appendChild(
							buildSlideElement(slide, sectionTag, index)
						);
					});

					loadedSections.add(sectionTag);
					Reveal.sync();
					console.log('[slides] Added', sectionData.length, 'slides for:', sectionTag);
				}

				function navigateToSection(sectionTag) {
					// Wait a frame for Reveal.sync() DOM updates to settle
					requestAnimationFrame(function () {
						var slides = Reveal.getSlides();
						var targetId = sectionTag + '-0';
						var idx = -1;
						for (var i = 0; i < slides.length; i++) {
							if (slides[i].id === targetId) {
								idx = i;
								break;
							}
						}
						if (idx >= 0) {
							Reveal.slide(idx);
							console.log('[nav] Jumped to', sectionTag, 'at index', idx);
						} else {
							console.error('[nav] Could not find slide for:', sectionTag);
						}
					});
				}

				// ── Section fetching ────────────────────────────────

				function fetchSection(tag) {
					return fetch(API_BASE + '/workshop/sections/' + tag)
						.then(function (res) {
							if (!res.ok) throw new Error('Section fetch failed: ' + res.status);
							return res.json();
						})
						.then(function (data) {
							addSectionSlides(data.section, tag);
							navigateToSection(tag);
						})
						.catch(function (err) {
							console.error('[section] Failed to load ' + tag + ':', err);
						});
				}

				// ── Poll loop (setTimeout chain — no overlap) ──────

				function pollOnce() {
					fetch(API_BASE + '/workshop/polls/top')
						.then(function (res) {
							if (!res.ok) throw new Error('Poll fetch failed: ' + res.status);
							return res.json();
						})
						.then(function (data) {
							var poll = data.poll;
							var pollTag = poll[0].pollTag;
							var isClosed = !!poll[0].closed;

							// New poll detected
							if (pollTag !== currentPollTag) {
								currentPollTag = pollTag;
								hasJumped = false;
								console.log('[poll] New poll detected:', pollTag);
							}

							// Poll just closed and we haven't acted on it
							if (isClosed && !hasJumped) {
								hasJumped = true;

								var winningTag;
								if (poll.length === 1) {
									winningTag = poll[0].tag;
								} else if (poll[0].votes > poll[1].votes) {
									winningTag = poll[0].tag;
								} else if (poll[1].votes > poll[0].votes) {
									winningTag = poll[1].tag;
								} else {
									// Tie — default to first option
									winningTag = poll[0].tag;
								}

								console.log('[poll] Closed. Winner:', winningTag,
									'(votes:', poll[0].tag, poll[0].votes,
									'vs', poll.length > 1 ? poll[1].tag : 'n/a',
									poll.length > 1 ? poll[1].votes : '', ')');

								// Fetch and display the winning section.
								// Don't schedule the next poll tick until this completes,
								// so we never poll while mid-navigation.
								fetchSection(winningTag).then(scheduleNextPoll);
								return;
							}

							scheduleNextPoll();
						})
						.catch(function (err) {
							console.error('[poll] Error:', err);
							scheduleNextPoll();
						});
				}

				function scheduleNextPoll() {
					setTimeout(pollOnce, POLL_INTERVAL);
				}

				// ── Start ───────────────────────────────────────────

				// Load the initial "start" section, then begin polling
				fetchSection('start').then(function () {
					console.log('[init] Start section loaded, beginning poll loop');
					scheduleNextPoll();
				});

			})();
		</script>
	</body>
</html>
